# 机器人管理 mock API（OpenResty）
#
# 安装目录: /usr/local/openresty
#
# 用法（WSL）:
#   sudo mkdir -p /usr/local/openresty/lua
#   sudo mkdir -p /usr/local/openresty/nginx/conf/conf.d
#   sudo cp bot-management.conf /usr/local/openresty/nginx/conf/conf.d/
#   sudo cp lua/bots.lua /usr/local/openresty/lua/
#   编辑 /usr/local/openresty/nginx/conf/nginx.conf 的 http {}:
#     lua_package_path "/usr/local/openresty/lua/?.lua;;";
#     include /usr/local/openresty/nginx/conf/conf.d/*.conf;
#   sudo /usr/local/openresty/bin/openresty -t
#   sudo /usr/local/openresty/bin/openresty -s reload
#
# 测试:
#   curl "http://127.0.0.1:8088/api/v1/bots?user_id=k7hgneowkbybj8zx1q9i6weccw"

server {
    listen 8088;
    server_name localhost;

    default_type application/json;
    charset utf-8;

    # 健康检查
    location = /health {
        return 200 '{"status":"ok","service":"bot-management-mock"}';
    }

    # 获取某人名下的机器人列表
    # GET /api/v1/bots?user_id={user_id}
    location = /api/v1/bots {
        limit_except GET {
            deny all;
        }

        content_by_lua_block {
            local bots = require "bots"
            bots.query()
        }
    }
}
